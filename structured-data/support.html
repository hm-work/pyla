<!--
  構造化データ：仕事と活動支援（/support）
  Studio 側で {{ }} 内の変数を設定する
-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": "{{siteUrl}}/support/#webpage",
      "url": "{{siteUrl}}/support",
      "name": "仕事と活動支援",
      "description": "{{supportDescription}}",
      "isPartOf": { "@id": "{{siteUrl}}/#website" },
      "inLanguage": "ja",
      "breadcrumb": { "@id": "{{siteUrl}}/support/#breadcrumb" }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{siteUrl}}/support/#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "ホーム",
          "item": "{{siteUrl}}/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "仕事と活動支援",
          "item": "{{siteUrl}}/support"
        }
      ]
    }
  ]
}
</script>
