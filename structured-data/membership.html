<!--
  構造化データ：新規入会の流れ（/membership）
  Studio 側で {{ }} 内の変数を設定する
-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": "{{siteUrl}}/membership/#webpage",
      "url": "{{siteUrl}}/membership",
      "name": "新規入会の流れ",
      "description": "{{membershipDescription}}",
      "isPartOf": { "@id": "{{siteUrl}}/#website" },
      "inLanguage": "ja",
      "breadcrumb": { "@id": "{{siteUrl}}/membership/#breadcrumb" }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{siteUrl}}/membership/#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "ホーム",
          "item": "{{siteUrl}}/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "新規入会の流れ",
          "item": "{{siteUrl}}/membership"
        }
      ]
    }
  ]
}
</script>
